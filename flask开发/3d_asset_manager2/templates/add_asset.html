<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加资产</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>
    <h1>添加资产</h1>
    <div class="form-container">
        <!-- 显示 Flash 消息 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('add_asset') }}" method="POST" enctype="multipart/form-data">
            <label for="asset_name">资产名称:</label>
            <input type="text" id="asset_name" name="asset_name" required>

            <label for="chinese_name">中文名称:</label>
            <input type="text" id="chinese_name" name="chinese_name">

            <label for="asset_type">资产类型:</label>
            <select id="asset_type" name="asset_type" required>
                <option value="角色">角色</option>
                <option value="道具">道具</option>
                <option value="场景">场景</option>
            </select>

            <label for="project">项目:</label>
            <select id="project" name="project" onchange="handleProjectChange()" required>
                {% if projects %}
                    {% for project in projects %}
                    <option value="{{ project }}">{{ project }}</option>
                    {% endfor %}
                {% else %}
                    <option value="新增项目" selected>新增项目</option>
                {% endif %}
                <option value="新增项目">新增项目</option>
            </select>
            <input type="text" id="new_project_input" class="new-project-input" placeholder="请输入新项目名称">

            <label for="thumbnail">缩略图:</label>
            <input type="file" id="thumbnail" name="thumbnail" accept=".png,.jpg,.jpeg,.gif">

            <label for="remarks">备注:</label>
            <textarea id="remarks" name="remarks" rows="4"></textarea>

            <button type="submit">添加资产</button>
        </form>
        <a href="{{ url_for('assets') }}" class="btn-back">返回资产列表</a>
    </div>

    <script>
        // 页面加载时检查项目下拉菜单
        document.addEventListener('DOMContentLoaded', function () {
            const projectSelect = document.getElementById('project');
            const newProjectInput = document.getElementById('new_project_input');

            // 如果没有项目可选，默认选中“新增项目”并显示输入框
            if (projectSelect.options.length === 1 && projectSelect.options[0].value === '新增项目') {
                projectSelect.value = '新增项目';
                newProjectInput.style.display = 'block';
                newProjectInput.setAttribute('required', true);
            }
        });

        // 处理项目下拉菜单变化
        function handleProjectChange() {
            const projectSelect = document.getElementById('project');
            const newProjectInput = document.getElementById('new_project_input');

            if (projectSelect.value === '新增项目') {
                // 显示新增项目输入框
                newProjectInput.style.display = 'block';
                newProjectInput.setAttribute('required', true);
            } else {
                // 隐藏新增项目输入框
                newProjectInput.style.display = 'none';
                newProjectInput.removeAttribute('required');
            }
        }



        // 检查资产名是否已存在
        async function checkAssetName() {
            const assetName = document.getElementById('asset_name').value.trim();
            if (!assetName) {
                alert('资产名称不能为空！');
                return false;
            }

            try {
                const response = await fetch(`/check_asset_name?asset_name=${encodeURIComponent(assetName)}`);
                const data = await response.json();

                if (data.exists) {
                    alert('资产名称已存在，请修改后重试！');
                    return false; // 阻止表单提交
                }
                return true; // 允许表单提交
            } catch (error) {
                console.error('检查资产名时出错:', error);
                alert('检查资产名时出错，请稍后重试！');
                return false;
            }
        }




        // 表单提交前的处理
        document.querySelector('form').addEventListener('submit', function (event) {
            const projectSelect = document.getElementById('project');
            const newProjectInput = document.getElementById('new_project_input');

            if (projectSelect.value === '新增项目') {
                // 将新增项目添加到下拉菜单并选中
                const newProjectValue = newProjectInput.value.trim();
                if (newProjectValue) {
                    const newOption = document.createElement('option');
                    newOption.value = newProjectValue;
                    newOption.textContent = newProjectValue;
                    newOption.selected = true;
                    projectSelect.insertBefore(newOption, projectSelect.lastChild);
                } else {
                    alert('请输入新项目名称！');
                    event.preventDefault(); // 阻止表单提交
                }
            }
        });
    </script>
</body>
</html>
