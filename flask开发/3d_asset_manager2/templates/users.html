<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>用户管理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <h1>用户管理</h1>
    <form action="{{ url_for('users') }}" method="get">
        <input type="text" name="search" value="{{ search_query }}">
        <select name="sort">
            <option value="username" {{ 'selected' if sort_column == 'username' }}>用户名</option>
            <option value="group" {{ 'selected' if sort_column == 'group' }}>用户组</option>
        </select>
        <select name="order">
            <option value="asc" {{ 'selected' if sort_order == 'asc' }}>升序</option>
            <option value="desc" {{ 'selected' if sort_order == 'desc' }}>降序</option>
        </select>
        <button type="submit">搜索</button>
    </form>
    <a href="{{ url_for('add_user') }}">添加新用户</a>
    <table>
        <tr>
            <th>用户名</th>
            <th>用户组</th>
            <th>操作</th>
        </tr>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td>{{ user.group }}</td>
            <td>
                <a href="{{ url_for('edit_user', user_id=user.user_id) }}">编辑</a>
                <a href="{{ url_for('delete_user', user_id=user.user_id) }}">删除</a>
            </td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
