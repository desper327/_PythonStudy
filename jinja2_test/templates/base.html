<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}表格生成器{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/css/styles.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <h1>表格生成器</h1>
        <nav>
            <ul>
                <li><a href="/">首页</a></li>
                <li><a href="/dynamic-table">动态表格</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <p>&copy; 2023 表格生成器 - 使用 FastAPI 和 Jinja2 构建</p>
    </footer>
    
    {% block scripts %}{% endblock %}
</body>
</html>
